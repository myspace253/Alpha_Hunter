version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-alpha_hunter}
      POSTGRES_USER: ${POSTGRES_USER:-alpha_hunter}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-change_me}
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"

  bot:
    build: .
    restart: unless-stopped
    depends_on:
      - postgres
      - redis
    env_file:
      - .env
    command: ["node", "dist/index.js"]

volumes:
  pgdata:
